<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dashboard - Hydrogen Lab Safety</title>
	<link rel="stylesheet" href="styles.css">
	<script src="script.js" defer></script>
</head>
<body>
	<!-- Top Bar -->
	<header class="topbar">
		<!-- Page Title -->
		<div class="left">
			<span class="title">Hydrogen Lab Safety - Dashboard</span>
		</div>
		
		<!-- Header Buttons -->
		<div class="right">
			<button>Home</button>
			<button>Modules</button>
			<button>Simulations</button>
			<button>Quizzes</button>
		</div>
	</header>
	
	<!-- Main Cards -->
	<div class="cards">
		<!-- Modules Card -->
		<div class="card">
			<h3>Modules</h3>
			<div class="icon">📚</div>
			<p>0 modules</p>
			<button class="cta">Coming Soon</button>
		</div>
		<!-- Simulations Card -->
		<div class="card">
			<h3>Simulations</h3>
			<div class="icon">📊</div>
			<p>1 Simulation</p>
			<button class="cta" id="simBtn">View Simulation →</button>
		</div>
		<!-- Quizzes Card -->
		<div class="card">
			<h3>Quizzes</h3>
			<div class="icon">✅</div>
			<p>0 Quizzes</p>
			<button class="cta">Coming Soon</button>
		</div>
	</div>

	<!-- Bottom Section -->
	<div class="bottom">
		<!-- Progress Bar -->
		<div class="progress-box">
			<h3>Training Progress</h3>
			<div class="progress-bar">
				<div class="progress-fill"></div>
			</div>
			<p>20% complete</p>
		</div>
		<!-- Certificate -->
		<div class="certificate-box">
			<h3>Completed Modules</h3>
			<div class="cert-content">
				<div class="cert-icon">🏅</div>
				<button class="cta">Coming Soon</button>
			</div>
		</div>
	</div>
</body>
</html>
